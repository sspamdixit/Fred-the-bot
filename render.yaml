services:
  - type: web
    name: bubbl-manager
    runtime: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: TOKEN
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: DASHBOARD_ORIGIN
        sync: false
    autoDeploy: true
